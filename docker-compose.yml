version: "3.9"

services:
  db:
    image: postgres:latest
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: .
    env_file: .env
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DB_HOST: db
      RMQ_HOST: rabbitmq
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "8000:8000"

  consumer:
    build: .
    env_file: .env
    command: sh -c "faststream run app.worker.consumer:app"
    environment:
      DB_HOST: db
      RMQ_HOST: rabbitmq
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      api:
        condition: service_started

volumes:
  postgres_data:
